name: Deploy to GitHub Pages

on:
  # Запуск при каждом пуше в ветку main
  push:
    branches: [main]
  # Позволяет запускать вручную из вкладки Actions
  workflow_dispatch:

# Права, нужные для деплоя на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем только один одновременный деплой
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        with:
          node-version: 22
        # По умолчанию: устанавливает зависимости, собирает в ./dist и загружает артефакт

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
